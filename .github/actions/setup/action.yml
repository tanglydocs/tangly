name: setup
description: Node + Bun setup + install with cache. Reusable across CI/release workflows.

inputs:
  bun-version:
    description: Bun version (matches packageManager in root package.json)
    required: false
    default: "1.3.11"
  node-version:
    description: Node version (Astro 6 requires >=22.12)
    required: false
    default: "22.12.0"

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
      with:
        node-version: ${{ inputs.node-version }}

    - name: Setup Bun
      uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Cache bun install
      uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Install
      shell: bash
      run: bun install --frozen-lockfile
