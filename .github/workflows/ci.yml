name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: format + lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup
      - run: bun run format:check
      - run: bun run lint
      # Workspace pkgs reference each other via dist/.d.ts; build first.
      - name: Build (so downstream typecheck sees emitted .d.ts)
        run: bun run build
      - run: bun run typecheck

  test:
    name: test (${{ matrix.os }} · bun ${{ matrix.bun }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        bun: ["1.2.0", "latest"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup
        with:
          bun-version: ${{ matrix.bun }}
      # Build first so cross-workspace imports (@tanglydocs/schema, etc.)
      # resolve to emitted dist/ during vitest's vite resolve.
      - run: bun run build
      - run: bun run test

  smoke:
    name: smoke (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup
      - run: bun run build
      - name: tangly init + migrate + build
        run: bun run scripts/smoke-init.ts
      - name: build own docs
        run: bun run build:docs
      # Catch packaging regressions (missing files, broken workspace rewrites)
      # without actually publishing. release.yml reuses the same logic.
      - name: npm pack dry run (all 8 packages)
        run: |
          for d in packages/schema packages/theme-ui packages/theme-tang packages/theme-pith packages/theme-pip packages/theme-readable packages/theme-geist packages/tangly; do
            echo "::group::pack $d"
            (cd "$d" && npm pack --dry-run --json | head -50)
            echo "::endgroup::"
          done

  # Pack every workspace pkg, install into a clean dir outside the
  # workspace, run init+build. Reproduces what bunx/npx users hit and
  # catches resolution bugs that bun's hoisted node_modules hides
  # (e.g. vite version skew under @tailwindcss/vite's permissive peer).
  pack-install-smoke:
    name: pack-install-smoke (${{ matrix.os }})
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
      - run: bun run build
      - name: tarball install + run
        run: bun run scripts/smoke-tarball.ts
