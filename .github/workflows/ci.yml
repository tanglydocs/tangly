name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: format + lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - run: bun run format:check
      - run: bun run lint
      # Workspace pkgs reference each other via dist/.d.ts; build first.
      - name: Build (so downstream typecheck sees emitted .d.ts)
        run: bun run build
      - run: bun run typecheck

  test:
    name: test (${{ matrix.os }} · bun ${{ matrix.bun }})
    needs: check
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        bun: ["1.3.11", "latest"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
        with:
          bun-version: ${{ matrix.bun }}
      # Build first so cross-workspace imports (@tanglydocs/schema, etc.)
      # resolve to emitted dist/ during vitest's vite resolve.
      - run: bun run build
      - run: bun run test

  coverage:
    name: coverage
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - run: bun run build
      - run: bun run test:coverage
      - name: Build shield JSON
        env:
          BADGE_OUT: ${{ runner.temp }}/coverage-badge.json
        run: bun run scripts/coverage-badge.ts "$BADGE_OUT"
      # Surface secret presence as an env var so we can gate the publish step
      # on it (secrets cannot be referenced directly in `if:`).
      - name: Check gist config
        id: gist_config
        env:
          GIST_SECRET: ${{ secrets.GIST_SECRET }}
          COVERAGE_GIST_ID: ${{ vars.COVERAGE_GIST_ID }}
        run: |
          if [ -n "$GIST_SECRET" ] && [ -n "$COVERAGE_GIST_ID" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping coverage gist publish — GIST_SECRET and/or COVERAGE_GIST_ID not set."
          fi
      - name: Publish coverage to gist
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.gist_config.outputs.configured == 'true'
        uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: coverage.json
          file: ${{ runner.temp }}/coverage-badge.json
          forceUpdate: true

  # Windows is in this matrix on purpose: issue #6 (ERR_INVALID_URL_SCHEME from
  # a drive-letter path fed to Astro's glob loader) was invisible to the
  # ubuntu/macos legs. smoke-init.ts drives init+migrate+build against a
  # synthesized project carrying Mintlify aliases, so this job gates both the
  # OS-path layer and the Mintlify-compat schema surface on every platform.
  # Job-level bash default lets the inline shell steps run under git-bash on
  # the Windows runner (the setup action already installs bun via bash).
  smoke:
    name: smoke (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - run: bun run build
      - name: tangly init + migrate + build (Mintlify aliases)
        run: bun run scripts/smoke-init.ts
      - name: build own docs
        run: bun run build:docs
      # Catch packaging regressions (missing files, broken workspace rewrites)
      # without actually publishing. release.yml reuses the same logic.
      - name: npm pack dry run (all 8 packages)
        run: |
          for d in packages/schema packages/theme-ui packages/theme-tang packages/theme-pith packages/theme-pip packages/theme-readable packages/theme-geist packages/tangly; do
            echo "::group::pack $d"
            (cd "$d" && npm pack --dry-run --json | head -50)
            echo "::endgroup::"
          done

  # Pack every workspace pkg, install into a clean dir outside the
  # workspace, run init+build. Reproduces what bunx/npx users hit and
  # catches resolution bugs that bun's hoisted node_modules hides
  # (e.g. vite version skew under @tailwindcss/vite's permissive peer).
  pack-install-smoke:
    name: pack-install-smoke (${{ matrix.os }})
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - run: bun run build
      - name: tarball install + run
        run: bun run scripts/smoke-tarball.ts

  # Same pack as pack-install-smoke, but installs ONLY tangly as a direct
  # dep — the realistic `npm i -g tangly` shape. Catches transitive-dep
  # hoisting bugs (e.g. piccolore, unist-util-visit-parents) that the
  # full-graph pack-install-smoke flattens past. This is the gate that
  # caught 0.0.8 → 0.0.10 shipping with broken installer-smoke.
  tarball-flat-smoke:
    name: tarball-flat-smoke (${{ matrix.os }})
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - run: bun run build
      - name: tarball flat install + run
        run: bun run scripts/smoke-tarball-flat.ts

  # Verify install.sh end-to-end: writes a wrapper that delegates to
  # bunx/npx, init+build through the wrapper succeeds. Tests the
  # production user flow (curl-pipe-bash → tangly init → tangly build)
  # against the published tangly@latest. Catches regressions in install.sh.
  installer-smoke:
    name: installer-smoke (${{ matrix.os }} · ${{ matrix.pm }})
    needs: pack-install-smoke
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        pm: [bun, npm]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - name: install.sh + init + build (via wrapper)
        env:
          PM: ${{ matrix.pm }}
        run: bun run scripts/smoke-installer.ts --pm "$PM"
