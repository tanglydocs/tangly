name: deps-report

on:
  schedule:
    # Mondays 14:00 UTC
    - cron: "0 14 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  knip:
    name: knip dep / dead-code scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - name: Run knip
        id: knip
        run: |
          set +e
          bun run lint:deps > knip-output.txt 2>&1
          echo "exit=$?" >> "$GITHUB_OUTPUT"
          {
            echo "report<<KNIP_EOF"
            cat knip-output.txt
            echo "KNIP_EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Upsert tracking issue
        if: steps.knip.outputs.exit != '0'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          KNIP_REPORT: ${{ steps.knip.outputs.report }}
        with:
          script: |
            const title = "deps: weekly knip report";
            const body = [
              "Auto-generated weekly knip scan. Findings:",
              "",
              "```",
              process.env.KNIP_REPORT,
              "```",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Reproduce locally: `bun run lint:deps`",
            ].join("\n");
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "deps-report",
            });
            const existing = issues.find((i) => i.title === title);
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["deps-report"],
              });
            }
