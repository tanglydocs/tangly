name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "packages/tangly/**"
      - "packages/theme-tang/**"
      - "packages/theme-pith/**"
      - "packages/theme-pip/**"
      - "packages/theme-readable/**"
      - "packages/theme-ui/**"
      - "packages/schema/**"
      - "bun.lock"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ./.github/actions/setup
      - run: bun run build
      # Custom domain (tangly.dev) serves from root.
      - name: Build docs (base = /)
        working-directory: docs
        run: ../packages/tangly/bin/tangly.js build --out ./dist --base /
      - name: Add CNAME for custom domain
        run: cp docs/CNAME docs/dist/CNAME
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: docs/dist

  deploy:
    name: deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
