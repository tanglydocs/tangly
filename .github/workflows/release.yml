name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Release bump"
        type: choice
        required: true
        default: patch
        options: [patch, minor, major, prerelease]
      prerelease_id:
        description: "Prerelease identifier (only when bump=prerelease)"
        type: choice
        required: false
        default: rc
        options: [rc, beta, alpha]
      dry_run:
        description: "Dry run (no tag, no publish)"
        type: boolean
        default: false
      confirm:
        description: 'Type "RELEASE" to confirm'
        type: string
        required: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: release tangly
    runs-on: ubuntu-latest
    env:
      BUMP: ${{ github.event.inputs.bump }}
      PRERELEASE_ID: ${{ github.event.inputs.prerelease_id }}
      DRY_RUN: ${{ github.event.inputs.dry_run }}
      CONFIRM: ${{ github.event.inputs.confirm }}
    steps:
      - name: Validate confirmation
        run: |
          if [ "$CONFIRM" != "RELEASE" ]; then
            echo "confirm input must be exactly RELEASE (got: $CONFIRM)"
            exit 1
          fi

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Safety gate (format / lint / typecheck / test / build)
        run: bun run ci

      - name: Compute next version
        id: ver
        working-directory: packages/tangly
        run: |
          if [ "$BUMP" = "prerelease" ]; then
            new=$(npm version prerelease --preid="$PRERELEASE_ID" --no-git-tag-version)
          else
            new=$(npm version "$BUMP" --no-git-tag-version)
          fi
          version="${new#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          if [ "$BUMP" = "prerelease" ]; then
            echo "dist_tag=$PRERELEASE_ID" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Pack & smoke (verify published tarball works)
        working-directory: packages/tangly
        run: |
          npm pack --pack-destination "$RUNNER_TEMP"
          tarball=$(ls "$RUNNER_TEMP"/tangly-*.tgz | head -1)
          echo "Tarball: $tarball"
          work="$RUNNER_TEMP/verify"
          mkdir -p "$work"
          cd "$work"
          npm init -y >/dev/null
          npm install "$tarball" --no-audit --no-fund
          npx tangly --version

      - name: Dry run summary
        if: ${{ env.DRY_RUN == 'true' }}
        env:
          NEW_VERSION: ${{ steps.ver.outputs.version }}
          DIST_TAG: ${{ steps.ver.outputs.dist_tag }}
        run: |
          echo "## Dry run" >> "$GITHUB_STEP_SUMMARY"
          echo "- version: \`$NEW_VERSION\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- dist-tag: \`$DIST_TAG\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- bump: \`$BUMP\`" >> "$GITHUB_STEP_SUMMARY"
          echo "No tag created, no publish."

      - name: Commit + tag
        if: ${{ env.DRY_RUN != 'true' }}
        env:
          NEW_VERSION: ${{ steps.ver.outputs.version }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/tangly/package.json
          git commit -m "chore(release): $TAG [skip ci]"
          git tag "$TAG"
          git push origin HEAD --follow-tags

      - name: Publish to npm
        if: ${{ env.DRY_RUN != 'true' }}
        working-directory: packages/tangly
        env:
          DIST_TAG: ${{ steps.ver.outputs.dist_tag }}
        run: npm publish --tag "$DIST_TAG" --provenance --access public

      - name: Create GitHub Release
        if: ${{ env.DRY_RUN != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          if [ "$BUMP" = "prerelease" ]; then
            gh release create "$TAG" --generate-notes --prerelease --title "$TAG"
          else
            gh release create "$TAG" --generate-notes --latest --title "$TAG"
          fi
