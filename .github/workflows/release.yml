name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Release bump"
        type: choice
        required: true
        default: patch
        options: [patch, minor, major, prerelease]
      prerelease_id:
        description: "Prerelease identifier (only when bump=prerelease)"
        type: choice
        required: false
        default: rc
        options: [rc, beta, alpha]
      dry_run:
        description: "Dry run (no tag, no publish)"
        type: boolean
        default: false
      confirm:
        description: 'Type "RELEASE" to confirm'
        type: string
        required: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: release tangly + @tanglydocs/*
    runs-on: ubuntu-latest
    env:
      BUMP: ${{ github.event.inputs.bump }}
      PRERELEASE_ID: ${{ github.event.inputs.prerelease_id }}
      DRY_RUN: ${{ github.event.inputs.dry_run }}
      CONFIRM: ${{ github.event.inputs.confirm }}
    steps:
      - name: Validate confirmation
        run: |
          if [ "$CONFIRM" != "RELEASE" ]; then
            echo "confirm input must be exactly RELEASE (got: $CONFIRM)"
            exit 1
          fi

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify NPM_TOKEN is set
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is empty or not set"
            exit 1
          fi

      - name: Safety gate (format / lint / build / typecheck / test)
        run: bun run ci

      # Belt + suspenders: if `bun run ci` somehow doesn't build (bun version
      # quirks etc.), make sure dist/ exists for every package before publish.
      - name: Ensure all packages built
        run: bun run build

      - name: Compute next version
        id: ver
        run: |
          current=$(node -p "require('./packages/tangly/package.json').version")
          if [ "$BUMP" = "prerelease" ]; then
            next=$(node -e "
              const semver = require('semver');
              console.log(semver.inc('$current', 'prerelease', '$PRERELEASE_ID'));
            " 2>/dev/null || npx --yes semver -i prerelease --preid "$PRERELEASE_ID" "$current")
          else
            next=$(npx --yes semver -i "$BUMP" "$current")
          fi
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "tag=v$next" >> "$GITHUB_OUTPUT"
          if [ "$BUMP" = "prerelease" ]; then
            echo "dist_tag=$PRERELEASE_ID" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "Releasing $current → $next"

      # Step 1: bump VERSION only in source-of-truth (workspace:* preserved).
      # This is what gets committed back to main.
      - name: Bump versions in package.json
        env:
          NEW_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          node -e '
            const fs = require("node:fs");
            const path = require("node:path");
            const v = process.env.NEW_VERSION;
            const dirs = [
              "packages/schema",
              "packages/theme-ui",
              "packages/theme-tang",
              "packages/theme-pith",
              "packages/theme-pip",
              "packages/theme-readable",
              "packages/theme-geist",
              "packages/tangly",
            ];
            for (const d of dirs) {
              const p = path.join(d, "package.json");
              const pkg = JSON.parse(fs.readFileSync(p, "utf8"));
              pkg.version = v;
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + "\n");
              console.log(pkg.name, "→", v);
            }
          '

      - name: Dry run summary
        if: ${{ env.DRY_RUN == 'true' }}
        env:
          NEW_VERSION: ${{ steps.ver.outputs.version }}
          DIST_TAG: ${{ steps.ver.outputs.dist_tag }}
        run: |
          {
            echo "## Dry run"
            echo "- version: \`$NEW_VERSION\`"
            echo "- dist-tag: \`$DIST_TAG\`"
            echo "- bump: \`$BUMP\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "No tag created, no publish."

      # Step 2: commit & tag the VERSION bump (deps still workspace:* — clean state).
      - name: Commit + tag
        if: ${{ env.DRY_RUN != 'true' }}
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json
          git commit -m "chore(release): $TAG [skip ci]"
          # Annotated tag (lightweight tags are NOT pushed by --follow-tags).
          git tag -a "$TAG" -m "Release $TAG"
          git push origin HEAD
          git push origin "$TAG"

      # Step 3: rewrite workspace:* → concrete versions IN-PLACE for publish.
      # NOT committed — so source-of-truth on main stays workspace:*.
      - name: Rewrite workspace:* deps for publish (working tree only)
        if: ${{ env.DRY_RUN != 'true' }}
        env:
          NEW_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          node -e '
            const fs = require("node:fs");
            const path = require("node:path");
            const v = process.env.NEW_VERSION;
            const dirs = [
              "packages/schema",
              "packages/theme-ui",
              "packages/theme-tang",
              "packages/theme-pith",
              "packages/theme-pip",
              "packages/theme-readable",
              "packages/theme-geist",
              "packages/tangly",
            ];
            const names = dirs.map(d => JSON.parse(fs.readFileSync(path.join(d, "package.json"), "utf8")).name);
            for (const d of dirs) {
              const p = path.join(d, "package.json");
              const pkg = JSON.parse(fs.readFileSync(p, "utf8"));
              for (const field of ["dependencies", "devDependencies", "peerDependencies", "optionalDependencies"]) {
                if (!pkg[field]) continue;
                for (const dep of Object.keys(pkg[field])) {
                  // Always rewrite internal deps to current release version, regardless of prior value.
                  if (names.includes(dep)) {
                    pkg[field][dep] = v;
                  }
                }
              }
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + "\n");
            }
            console.log("Rewrote internal deps →", v);
          '

      - name: Pack & smoke (verify the published tarball works)
        if: ${{ env.DRY_RUN != 'true' }}
        run: |
          cd packages/tangly
          bun pm pack --destination "$RUNNER_TEMP"
          tarball=$(ls "$RUNNER_TEMP"/tangly-*.tgz | head -1)
          echo "Tarball: $tarball"

      - name: Publish all packages (topological order)
        if: ${{ env.DRY_RUN != 'true' }}
        env:
          DIST_TAG: ${{ steps.ver.outputs.dist_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for d in packages/schema packages/theme-ui packages/theme-tang packages/theme-pith packages/theme-pip packages/theme-readable packages/theme-geist packages/tangly; do
            echo "::group::Publish $d @ $DIST_TAG"
            (cd "$d" && npm publish --tag "$DIST_TAG" --access public)
            echo "::endgroup::"
          done

      - name: Create GitHub Release
        if: ${{ env.DRY_RUN != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          # --target $GITHUB_SHA: belt + suspenders in case the tag isn't
          # visible to gh CLI yet (it just got pushed in a prior step).
          if [ "$BUMP" = "prerelease" ]; then
            gh release create "$TAG" --generate-notes --prerelease --title "$TAG" --target "$GITHUB_SHA"
          else
            gh release create "$TAG" --generate-notes --latest --title "$TAG" --target "$GITHUB_SHA"
          fi
