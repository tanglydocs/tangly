name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Release bump (applied to each CHANGED package)"
        type: choice
        required: true
        default: patch
        options: [patch, minor, major, prerelease]
      prerelease_id:
        description: "Prerelease identifier (only when bump=prerelease)"
        type: choice
        required: false
        default: rc
        options: [rc, beta, alpha]
      dry_run:
        description: "Dry run (compute plan only — no tag, no publish)"
        type: boolean
        default: false
      confirm:
        description: 'Type "RELEASE" to confirm'
        type: string
        required: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: release changed @tanglydocs/* packages
    runs-on: ubuntu-latest
    env:
      BUMP: ${{ github.event.inputs.bump }}
      PRERELEASE_ID: ${{ github.event.inputs.prerelease_id }}
      DRY_RUN: ${{ github.event.inputs.dry_run }}
      CONFIRM: ${{ github.event.inputs.confirm }}
    steps:
      - name: Validate confirmation
        run: |
          if [ "$CONFIRM" != "RELEASE" ]; then
            echo "confirm input must be exactly RELEASE (got: $CONFIRM)"
            exit 1
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Verify NPM_TOKEN is set
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is empty or not set"
            exit 1
          fi

      - name: Safety gate (format / lint / build / typecheck / test)
        run: bun run ci

      # Belt + suspenders: if `bun run ci` somehow doesn't build (bun version
      # quirks etc.), make sure dist/ exists for every package before publish.
      - name: Ensure all packages built
        run: bun run build

      - name: Validate release planner
        run: bun x vitest run scripts/release-plan.test.ts

      # ---- Changed-only release plan ----
      # Detect which publishable packages changed since their last publish, expand
      # to dependents only when a bump escapes their caret range, and emit the
      # exact version + publish + dep-rewrite plan. Computed ONCE here, persisted
      # to $RUNNER_TEMP/plan.json, and consumed (never re-detected) by later steps.
      - name: Compute release plan
        id: plan
        run: |
          bun scripts/release-plan.ts plan \
            --bump "$BUMP" --prerelease-id "$PRERELEASE_ID" \
            --out "$RUNNER_TEMP/plan.json"
          node -e '
            const fs = require("node:fs");
            const p = require(process.env.RUNNER_TEMP + "/plan.json");
            const set = (k, v) => fs.appendFileSync(process.env.GITHUB_OUTPUT, `${k}=${v}\n`);
            set("any", p.anyPublish);
            set("core", p.corePublished);
            set("tangly", p.tanglyVersion);
            set("tag", p.tag ?? "");
            set("dist_tag", p.distTag);
          '
          echo "----- plan -----"
          cat "$RUNNER_TEMP/plan.json"

      - name: Nothing to publish
        if: ${{ steps.plan.outputs.any != 'true' }}
        run: |
          echo "No publishable package changed since its last release — nothing to do." \
            | tee -a "$GITHUB_STEP_SUMMARY"

      # Core (tangly) releases REQUIRE a changelog entry. Runs in dry-run too so a
      # missing entry surfaces before a real release. Non-core releases skip this.
      - name: Changelog gate (core release requires an entry)
        if: ${{ steps.plan.outputs.any == 'true' && steps.plan.outputs.core == 'true' }}
        env:
          TANGLY_VERSION: ${{ steps.plan.outputs.tangly }}
        run: |
          if ! bun scripts/extract-release-notes.ts "$TANGLY_VERSION" > /dev/null; then
            echo "::error::tangly is being published as v$TANGLY_VERSION but docs/changelog.mdx has no <Update label=\"v$TANGLY_VERSION\"> entry. Add it and re-run."
            exit 1
          fi
          echo "Changelog entry for v$TANGLY_VERSION present."

      - name: Dry run summary
        if: ${{ env.DRY_RUN == 'true' }}
        run: |
          {
            echo "## Dry run — release plan"
            echo '```json'
            cat "$RUNNER_TEMP/plan.json"
            echo '```'
            echo "No tag created, no publish."
          } >> "$GITHUB_STEP_SUMMARY"

      # ---- From here on: real release of the changed subset only ----

      # Bump package.json versions for the publish set (committed) + sync skills
      # to tangly's version. Internal deps stay workspace:* until the publish rewrite.
      - name: Apply versions + sync skills
        if: ${{ steps.plan.outputs.any == 'true' && env.DRY_RUN != 'true' }}
        run: |
          bun scripts/release-plan.ts apply-versions --plan "$RUNNER_TEMP/plan.json"
          bun run scripts/sync-skill-versions.ts

      # Smoke BEFORE commit/tag/publish so a resolution failure aborts cleanly with
      # nothing pushed. The smoke scripts stage their own copies + caret-rewrite, so
      # the source tree keeps workspace:* here. They pack ALL packages (tangly needs
      # the full graph) at the just-bumped versions.
      - name: Tarball install smoke (gates publish)
        if: ${{ steps.plan.outputs.any == 'true' && env.DRY_RUN != 'true' }}
        run: bun run scripts/smoke-tarball.ts

      - name: Tarball flat-install smoke (gates publish)
        if: ${{ steps.plan.outputs.any == 'true' && env.DRY_RUN != 'true' }}
        run: bun run scripts/smoke-tarball-flat.ts

      # Commit the version bumps (workspace:* intact) + per-package tags
      # `<key>@<version>` (the change baselines for next time). Core releases also
      # get a `v<tanglyVersion>` tag.
      - name: Commit + tag
        if: ${{ steps.plan.outputs.any == 'true' && env.DRY_RUN != 'true' }}
        env:
          CORE: ${{ steps.plan.outputs.core }}
          TAG: ${{ steps.plan.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          SUBJECT=$(node -e 'const p=require(process.env.RUNNER_TEMP+"/plan.json");console.log(p.publish.map(k=>`${p.packages[k].name}@${p.packages[k].newVersion}`).join(", "))')
          git add packages/*/package.json skills/*/SKILL.md
          git commit -m "chore(release): $SUBJECT [skip ci]"
          node -e 'const p=require(process.env.RUNNER_TEMP+"/plan.json");for(const k of p.publish)console.log(`${k}@${p.packages[k].newVersion}`)' > "$RUNNER_TEMP/tags.txt"
          while read -r t; do
            [ -n "$t" ] && git tag -a "$t" -m "Release $t"
          done < "$RUNNER_TEMP/tags.txt"
          if [ "$CORE" = "true" ]; then
            git tag -a "$TAG" -m "Release $TAG"
          fi
          git push origin HEAD
          git push origin --tags

      # Rewrite workspace:* -> ^version IN-PLACE for publish only (NOT committed —
      # source-of-truth on main stays workspace:*).
      - name: Rewrite internal deps to caret (working tree)
        if: ${{ steps.plan.outputs.any == 'true' && env.DRY_RUN != 'true' }}
        run: bun scripts/release-plan.ts apply-rewrite --plan "$RUNNER_TEMP/plan.json"

      - name: Publish changed packages (topological order)
        if: ${{ steps.plan.outputs.any == 'true' && env.DRY_RUN != 'true' }}
        env:
          DIST_TAG: ${{ steps.plan.outputs.dist_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in $(node -e 'const p=require(process.env.RUNNER_TEMP+"/plan.json");console.log(p.publish.map(k=>p.packages[k].dir).join(" "))'); do
            echo "::group::Publish $dir @ $DIST_TAG"
            (cd "$dir" && npm publish --tag "$DIST_TAG" --access public)
            echo "::endgroup::"
          done

      - name: Extract release notes (core)
        if: ${{ steps.plan.outputs.any == 'true' && steps.plan.outputs.core == 'true' && env.DRY_RUN != 'true' }}
        env:
          TANGLY_VERSION: ${{ steps.plan.outputs.tangly }}
        run: bun scripts/extract-release-notes.ts "$TANGLY_VERSION" > RELEASE_NOTES.md

      - name: Create GitHub Release (core)
        if: ${{ steps.plan.outputs.any == 'true' && steps.plan.outputs.core == 'true' && env.DRY_RUN != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.plan.outputs.tag }}
        run: |
          # --target $GITHUB_SHA: belt + suspenders in case the tag isn't visible
          # to gh CLI yet (it was just pushed). An existing pushed tag wins.
          if [ "$BUMP" = "prerelease" ]; then
            gh release create "$TAG" --prerelease --title "$TAG" --target "$GITHUB_SHA" --notes-file RELEASE_NOTES.md
          else
            gh release create "$TAG" --latest --title "$TAG" --target "$GITHUB_SHA" --notes-file RELEASE_NOTES.md
          fi

      - name: Release summary
        if: ${{ steps.plan.outputs.any == 'true' && env.DRY_RUN != 'true' }}
        run: |
          {
            echo "## Released"
            node -e 'const p=require(process.env.RUNNER_TEMP+"/plan.json");for(const k of p.publish)console.log(`- ${p.packages[k].name}@${p.packages[k].newVersion} (\`${k}@${p.packages[k].newVersion}\`)`)'
            if [ "${{ steps.plan.outputs.core }}" = "true" ]; then
              echo ""
              echo "Core release: \`${{ steps.plan.outputs.tag }}\` (GitHub Release created from changelog)."
            else
              echo ""
              echo "Non-core release: theme/schema packages only — no \`v*\` tag, no GitHub Release."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
