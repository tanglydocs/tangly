name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Release bump"
        type: choice
        required: true
        default: patch
        options: [patch, minor, major, prerelease]
      prerelease_id:
        description: "Prerelease identifier (only when bump=prerelease)"
        type: choice
        required: false
        default: rc
        options: [rc, beta, alpha]
      dry_run:
        description: "Dry run (no tag, no publish)"
        type: boolean
        default: false
      confirm:
        description: 'Type "RELEASE" to confirm'
        type: string
        required: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: release tangly + @tanglydocs/*
    runs-on: ubuntu-latest
    env:
      BUMP: ${{ github.event.inputs.bump }}
      PRERELEASE_ID: ${{ github.event.inputs.prerelease_id }}
      DRY_RUN: ${{ github.event.inputs.dry_run }}
      CONFIRM: ${{ github.event.inputs.confirm }}
    steps:
      - name: Validate confirmation
        run: |
          if [ "$CONFIRM" != "RELEASE" ]; then
            echo "confirm input must be exactly RELEASE (got: $CONFIRM)"
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ./.github/actions/setup

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Verify NPM_TOKEN is set
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is empty or not set"
            exit 1
          fi

      - name: Safety gate (format / lint / build / typecheck / test)
        run: bun run ci

      # Belt + suspenders: if `bun run ci` somehow doesn't build (bun version
      # quirks etc.), make sure dist/ exists for every package before publish.
      - name: Ensure all packages built
        run: bun run build

      - name: Compute next version
        id: ver
        run: |
          current=$(node -p "require('./packages/tangly/package.json').version")
          # Inline semver bump — avoids `npx --yes semver` which has flaked
          # (registry hiccups produce `sh: 1: semver: not found` and exit 127).
          next=$(BUMP="$BUMP" PRERELEASE_ID="$PRERELEASE_ID" node -e '
            const cur = process.argv[1];
            const bump = process.env.BUMP;
            const id = process.env.PRERELEASE_ID || "rc";
            const m = cur.match(/^(\d+)\.(\d+)\.(\d+)(?:-([0-9A-Za-z.-]+))?$/);
            if (!m) { console.error("bad semver: " + cur); process.exit(1); }
            let [, maj, min, pat, pre] = m;
            maj = +maj; min = +min; pat = +pat;
            if (bump === "major") { maj++; min = 0; pat = 0; pre = undefined; }
            else if (bump === "minor") { min++; pat = 0; pre = undefined; }
            else if (bump === "patch") { pat++; pre = undefined; }
            else if (bump === "prerelease") {
              if (pre && pre.startsWith(id + ".")) {
                const n = parseInt(pre.slice(id.length + 1), 10);
                pre = `${id}.${Number.isFinite(n) ? n + 1 : 0}`;
              } else {
                pat++;
                pre = `${id}.0`;
              }
            } else { console.error("unknown bump: " + bump); process.exit(1); }
            const out = `${maj}.${min}.${pat}` + (pre ? `-${pre}` : "");
            console.log(out);
          ' "$current")
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "tag=v$next" >> "$GITHUB_OUTPUT"
          if [ "$BUMP" = "prerelease" ]; then
            echo "dist_tag=$PRERELEASE_ID" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "Releasing $current → $next"

      # Step 1: bump VERSION only in source-of-truth (workspace:* preserved).
      # This is what gets committed back to main.
      - name: Bump versions in package.json
        env:
          NEW_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          node -e '
            const fs = require("node:fs");
            const path = require("node:path");
            const v = process.env.NEW_VERSION;
            const dirs = [
              "packages/schema",
              "packages/theme-ui",
              "packages/theme-tang",
              "packages/theme-pith",
              "packages/theme-pip",
              "packages/theme-readable",
              "packages/theme-geist",
              "packages/tangly",
            ];
            for (const d of dirs) {
              const p = path.join(d, "package.json");
              const pkg = JSON.parse(fs.readFileSync(p, "utf8"));
              pkg.version = v;
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + "\n");
              console.log(pkg.name, "→", v);
            }
          '

      - name: Sync skill versions to package version
        run: bun run scripts/sync-skill-versions.ts

      - name: Dry run summary
        if: ${{ env.DRY_RUN == 'true' }}
        env:
          NEW_VERSION: ${{ steps.ver.outputs.version }}
          DIST_TAG: ${{ steps.ver.outputs.dist_tag }}
        run: |
          {
            echo "## Dry run"
            echo "- version: \`$NEW_VERSION\`"
            echo "- dist-tag: \`$DIST_TAG\`"
            echo "- bump: \`$BUMP\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "No tag created, no publish."

      # Step 2: commit & tag the VERSION bump (deps still workspace:* — clean state).
      - name: Commit + tag
        if: ${{ env.DRY_RUN != 'true' }}
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json skills/*/SKILL.md
          git commit -m "chore(release): $TAG [skip ci]"
          # Annotated tag (lightweight tags are NOT pushed by --follow-tags).
          git tag -a "$TAG" -m "Release $TAG"
          git push origin HEAD
          git push origin "$TAG"

      # Step 3: rewrite workspace:* → concrete versions IN-PLACE for publish.
      # NOT committed — so source-of-truth on main stays workspace:*.
      - name: Rewrite workspace:* deps for publish (working tree only)
        if: ${{ env.DRY_RUN != 'true' }}
        env:
          NEW_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          node -e '
            const fs = require("node:fs");
            const path = require("node:path");
            const v = process.env.NEW_VERSION;
            const dirs = [
              "packages/schema",
              "packages/theme-ui",
              "packages/theme-tang",
              "packages/theme-pith",
              "packages/theme-pip",
              "packages/theme-readable",
              "packages/theme-geist",
              "packages/tangly",
            ];
            const names = dirs.map(d => JSON.parse(fs.readFileSync(path.join(d, "package.json"), "utf8")).name);
            for (const d of dirs) {
              const p = path.join(d, "package.json");
              const pkg = JSON.parse(fs.readFileSync(p, "utf8"));
              for (const field of ["dependencies", "devDependencies", "peerDependencies", "optionalDependencies"]) {
                if (!pkg[field]) continue;
                for (const dep of Object.keys(pkg[field])) {
                  // Always rewrite internal deps to current release version, regardless of prior value.
                  if (names.includes(dep)) {
                    pkg[field][dep] = v;
                  }
                }
              }
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + "\n");
            }
            console.log("Rewrote internal deps →", v);
          '

      - name: Pack & smoke (verify the published tarball works)
        if: ${{ env.DRY_RUN != 'true' }}
        run: |
          cd packages/tangly
          bun pm pack --destination "$RUNNER_TEMP"
          tarball=$(ls "$RUNNER_TEMP"/tangly-*.tgz | head -1)
          echo "Tarball: $tarball"

      # Pack all 8 packages, install into a clean dir outside the workspace,
      # run init+build end-to-end. This is the only gate that catches the
      # resolution bugs visible to bunx/npx users (single-vite hoisting,
      # peer auto-install) before publish — failing here aborts the release.
      - name: Tarball install smoke (gates publish)
        if: ${{ env.DRY_RUN != 'true' }}
        run: bun run scripts/smoke-tarball.ts

      # Same pack as above, but installs ONLY tangly as a direct dep (the
      # realistic `npm i -g tangly` shape). Catches transitive-dep hoisting
      # bugs the full-graph smoke flattens past. 0.0.8 → 0.0.10 each shipped
      # broken because no pre-publish gate exercised this layout.
      - name: Tarball flat-install smoke (gates publish)
        if: ${{ env.DRY_RUN != 'true' }}
        run: bun run scripts/smoke-tarball-flat.ts

      - name: Publish all packages (topological order)
        if: ${{ env.DRY_RUN != 'true' }}
        env:
          DIST_TAG: ${{ steps.ver.outputs.dist_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for d in packages/schema packages/theme-ui packages/theme-tang packages/theme-pith packages/theme-pip packages/theme-readable packages/theme-geist packages/tangly; do
            echo "::group::Publish $d @ $DIST_TAG"
            (cd "$d" && npm publish --tag "$DIST_TAG" --access public)
            echo "::endgroup::"
          done

      - name: Extract release notes from docs/changelog.mdx
        if: ${{ env.DRY_RUN != 'true' }}
        id: notes
        env:
          NEW_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          if bun run scripts/extract-release-notes.ts "$NEW_VERSION" > RELEASE_NOTES.md; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Using docs/changelog.mdx body for v$NEW_VERSION"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            rm -f RELEASE_NOTES.md
            echo "::warning::No <Update label=\"v$NEW_VERSION\"> in docs/changelog.mdx; falling back to --generate-notes"
          fi

      - name: Create GitHub Release
        if: ${{ env.DRY_RUN != 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
          FOUND: ${{ steps.notes.outputs.found }}
        run: |
          # --target $GITHUB_SHA: belt + suspenders in case the tag isn't
          # visible to gh CLI yet (it just got pushed in a prior step).
          flags=()
          if [ "$FOUND" = "true" ]; then
            flags+=(--notes-file RELEASE_NOTES.md)
          else
            flags+=(--generate-notes)
          fi
          if [ "$BUMP" = "prerelease" ]; then
            gh release create "$TAG" --prerelease --title "$TAG" --target "$GITHUB_SHA" "${flags[@]}"
          else
            gh release create "$TAG" --latest --title "$TAG" --target "$GITHUB_SHA" "${flags[@]}"
          fi
