name: dev-release

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "bun.lock"
      - ".github/workflows/dev-release.yml"

permissions:
  contents: read
  id-token: write

concurrency:
  group: dev-release
  cancel-in-progress: false

jobs:
  publish:
    name: publish tangly@dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: ./.github/actions/setup

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Compute dev version
        id: ver
        env:
          SHA: ${{ github.sha }}
        run: |
          base=$(node -p "require('./packages/tangly/package.json').version")
          short="${SHA:0:7}"
          stamp=$(date -u +%Y%m%d%H%M%S)
          echo "version=${base}-dev.${stamp}.${short}" >> "$GITHUB_OUTPUT"

      - run: bun run build

      - name: Bump version (no commit)
        working-directory: packages/tangly
        env:
          NEW_VERSION: ${{ steps.ver.outputs.version }}
        run: npm version "$NEW_VERSION" --no-git-tag-version --allow-same-version

      - name: Publish dev
        working-directory: packages/tangly
        run: npm publish --tag dev --provenance --access public
