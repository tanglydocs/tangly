name: dev-release

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "bun.lock"
      - ".github/workflows/dev-release.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: dev-release
  cancel-in-progress: false

jobs:
  publish:
    name: publish tangly + @tanglydocs/* @ dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: ./.github/actions/setup

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify NPM_TOKEN is set
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is empty or not set"
            exit 1
          fi
          echo "NPM_TOKEN length: ${#NPM_TOKEN}"

      - name: Compute dev version
        id: ver
        env:
          SHA: ${{ github.sha }}
        run: |
          base=$(node -p "require('./packages/tangly/package.json').version")
          short="${SHA:0:7}"
          stamp=$(date -u +%Y%m%d%H%M%S)
          echo "version=${base}-dev.${stamp}.${short}" >> "$GITHUB_OUTPUT"

      - run: bun run build

      - name: Bump versions + rewrite workspace:* deps to concrete versions
        env:
          NEW_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          node -e '
            const fs = require("node:fs");
            const path = require("node:path");
            const v = process.env.NEW_VERSION;
            const dirs = [
              "packages/schema",
              "packages/theme-ui",
              "packages/theme-tang",
              "packages/theme-pith",
              "packages/theme-pip",
              "packages/theme-readable",
              "packages/theme-geist",
              "packages/tangly",
            ];
            // Build name → version map (all share v in lockstep)
            const names = dirs.map(d => JSON.parse(fs.readFileSync(path.join(d, "package.json"), "utf8")).name);
            // Two passes: bump, then rewrite deps
            for (const d of dirs) {
              const p = path.join(d, "package.json");
              const pkg = JSON.parse(fs.readFileSync(p, "utf8"));
              pkg.version = v;
              for (const field of ["dependencies", "devDependencies", "peerDependencies", "optionalDependencies"]) {
                if (!pkg[field]) continue;
                for (const dep of Object.keys(pkg[field])) {
                  if (names.includes(dep) && pkg[field][dep] === "workspace:*") {
                    pkg[field][dep] = v;
                  }
                }
              }
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + "\n");
              console.log(pkg.name, "→", v);
            }
          '

      # Topological order: schema → theme-ui → 5 themes → tangly.
      - name: Publish all packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for d in packages/schema packages/theme-ui packages/theme-tang packages/theme-pith packages/theme-pip packages/theme-readable packages/theme-geist packages/tangly; do
            echo "::group::Publish $d @ dev"
            (cd "$d" && npm publish --tag dev --access public)
            echo "::endgroup::"
          done
