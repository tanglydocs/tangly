name: dev-release

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "bun.lock"
      - ".github/workflows/dev-release.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: dev-release
  cancel-in-progress: false

jobs:
  publish:
    name: publish tangly + @tanglydocs/* @ dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: ./.github/actions/setup

      - name: Configure npm auth (write both ~/.npmrc and project .npmrc)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is empty or not set"
            exit 1
          fi
          echo "NPM_TOKEN length: ${#NPM_TOKEN}"
          {
            echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN"
            echo "registry=https://registry.npmjs.org/"
            echo "always-auth=true"
          } | tee ~/.npmrc > .npmrc
          echo "--- ~/.npmrc (token redacted) ---"
          sed 's|_authToken=.*|_authToken=***|' ~/.npmrc

      - name: Compute dev version
        id: ver
        env:
          SHA: ${{ github.sha }}
        run: |
          base=$(node -p "require('./packages/tangly/package.json').version")
          short="${SHA:0:7}"
          stamp=$(date -u +%Y%m%d%H%M%S)
          echo "version=${base}-dev.${stamp}.${short}" >> "$GITHUB_OUTPUT"

      - run: bun run build

      - name: Bump all workspace versions in lockstep
        env:
          NEW_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          node -e '
            const fs = require("node:fs");
            const path = require("node:path");
            const v = process.env.NEW_VERSION;
            const dirs = [
              "packages/schema",
              "packages/theme-ui",
              "packages/theme-tang",
              "packages/theme-pith",
              "packages/theme-pip",
              "packages/theme-readable",
              "packages/theme-geist",
              "packages/tangly",
            ];
            for (const d of dirs) {
              const p = path.join(d, "package.json");
              const pkg = JSON.parse(fs.readFileSync(p, "utf8"));
              pkg.version = v;
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + "\n");
              console.log(pkg.name, "→", v);
            }
          '

      # bun publish rewrites workspace:* to the concrete version of each
      # workspace dep at publish time, which npm publish does not do.
      # Topological order: schema (no internal deps) → theme-ui → themes → tangly.
      - name: Publish @tanglydocs/schema @dev
        working-directory: packages/schema
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --tag dev --access public
      - name: Publish @tanglydocs/theme-ui @dev
        working-directory: packages/theme-ui
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --tag dev --access public
      - name: Publish @tanglydocs/theme-tang @dev
        working-directory: packages/theme-tang
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --tag dev --access public
      - name: Publish @tanglydocs/theme-pith @dev
        working-directory: packages/theme-pith
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --tag dev --access public
      - name: Publish @tanglydocs/theme-pip @dev
        working-directory: packages/theme-pip
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --tag dev --access public
      - name: Publish @tanglydocs/theme-readable @dev
        working-directory: packages/theme-readable
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --tag dev --access public
      - name: Publish @tanglydocs/theme-geist @dev
        working-directory: packages/theme-geist
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --tag dev --access public
      - name: Publish tangly @dev
        working-directory: packages/tangly
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: bun publish --tag dev --access public
